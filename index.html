<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unbreakable Bond | Cover</title>
  <style>
    body {
      margin: 0;
      background-color: #fdfbf7; /* Elegant warm white */
      font-family: 'Times New Roman', Times, serif; /* Vogue style font */
      text-align: center;
      color: #111;
    }
    .cover-image {
      width: 100%;
      height: 70vh;
      object-fit: cover;
    }
    h1 {
      font-size: 45px;
      letter-spacing: 8px;
      margin: 20px 0 5px 0;
      font-weight: normal;
      text-transform: uppercase;
    }
    p {
      font-size: 14px;
      letter-spacing: 2px;
      color: #555;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      padding: 12px 30px;
      border: 1px solid #111;
      text-decoration: none;
      color: #111;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: 0.3s;
    }
    .btn:hover {
      background-color: #111;
      color: #fff;
    }
  </style>
</head>
<body>

  <img src="photo1.jpg" class="cover-image" alt="Cover Photo">
  
  <h1>Unbreakable</h1>
  <p>THE EXCLUSIVE EDITION</p>
  
  <a href="page2.html" class="btn">Open Magazine</a>

</body>
</html>
