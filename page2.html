<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page 2</title>
  <style>
    body {
      margin: 0;
      background-color: #fdfbf7;
      font-family: 'Times New Roman', Times, serif;
      color: #111;
      display: flex;
      flex-direction: column; /* Stacks on mobile */
      min-height: 100vh;
    }
    .photo-side {
      width: 100%;
      height: 50vh; /* Takes up top half of screen on phone */
    }
    .photo-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .text-side {
      padding: 40px 20px;
      text-align: center;
    }
    h2 {
      font-size: 28px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 20px;
      font-weight: normal;
    }
    p {
      font-size: 16px;
      line-height: 1.8;
      color: #444;
      max-width: 400px;
      margin: 0 auto 30px auto;
      font-style: italic; /* Gives it that poetic feel */
    }
    .nav-links {
      margin-top: 40px;
    }
    .nav-links a {
      text-decoration: none;
      color: #111;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid #111;
      padding-bottom: 3px;
    }
    
    /* Makes it side-by-side on larger screens like tablets/laptops */
    @media (min-width: 768px) {
      body { flex-direction: row; }
      .photo-side { width: 50%; height: 100vh; }
      .text-side { width: 50%; padding: 60px; display: flex; flex-direction: column; justify-content: center; }
    }
  </style>
</head>
<body>

  <div class="photo-side">
    <img src="photo2.jpg" alt="Editorial Photo">
  </div>
  
  <div class="text-side">
    <h2>The Spark</h2>
    
    <p There is a silent conversation between the stars and the sea at night; it is the most beautiful thing I have ever heard.>
      "Write your beautiful words here.<br>
      Use the &lt;br&gt; tag to drop down<br>
      to the next line if you are writing a poem.<br>
      Make it meaningful and elegant."
    </p>

    <div class="nav-links">
      <a href="page3.html">Next Page &rarr;</a>
    </div>
  </div>

</body>
</html>
